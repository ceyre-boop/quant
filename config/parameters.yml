# ── Sentiment board-state pipeline (sovereign/sentiment/) — Step 0 data layer ──────────────────────
# Thresholds live here (never hardcoded). VIX regime cutoffs and the news rolling window are config.
sentiment:
  news:
    rolling_window_hours: 48       # rolling sentiment lookback per pair (48h: NewsAPI Developer tier delays ~24h, so 24h window returned 0 articles)
    max_articles: 100              # NewsAPI pageSize per pair query
    # Per-pair topic queries for NewsAPI /v2/everything (OR-joined). Tunable here, not in code.
    pairs:
      EURUSD: ['euro', 'ECB', 'eurozone', 'EUR/USD', 'European Central Bank']
      GBPUSD: ['pound sterling', 'Bank of England', 'GBP/USD', 'UK economy', 'gilt']
      USDJPY: ['Japanese yen', 'Bank of Japan', 'USD/JPY', 'Japan economy', 'BOJ']
      AUDUSD: ['Australian dollar', 'RBA', 'AUD/USD', 'Australia economy', 'Reserve Bank of Australia']
  vix_regime:                      # LOW <low_max, NORMAL [low_max,normal_max], HIGH (normal_max,spike_min], SPIKE >spike_min
    low_max: 15
    normal_max: 25
    spike_min: 30
  vix:
    ticker: '^VIX'                  # yfinance symbol (already used across the repo)
    momentum_lookback_days: 5       # VIX - VIX_5d_ago
  fred:
    series: ['DFF', 'T10Y2Y', 'VIXCLS', 'BAMLH0A0HYM2', 'T10YIE']
    delta_windows: [1, 5]          # business-day deltas computed per series
  macro_start: '2015-01-01'        # FRED/VIX backfill start (full carry history)
  db_path: data/sentiment.db       # DuckDB store, relative to repo root
  # ── Step 1: GDELT texture (free, keyless DOC API; full-history news tone) ──
  gdelt:
    start: '2017-01-01'            # GDELT DOC API coverage begins ~2017
    rate_limit_sec: 5             # GDELT throttles to 1 req / 5s (returns PLAIN-TEXT when exceeded)
    timeout_sec: 30
    max_retries: 3                # backoff retries when the throttle text comes back
    tone_momentum_days: 5         # gdelt_tone_5d = tone_score - tone_score_5d_ago
    pairs:                        # free-text DOC API queries per pair (OR-style), tunable here
      EURUSD: 'ECB eurozone euro'
      GBPUSD: '"Bank of England" pound sterling'
      USDJPY: '"Bank of Japan" yen'
      AUDUSD: '"Reserve Bank of Australia" Australian dollar'
  # ── Step 1: economic-surprise spine (FREE "release innovation" — NOT a consensus surprise) ──
  surprise:
    releases: ['CPIAUCSL', 'CPILFESL', 'PCEPILFE', 'PAYEMS', 'UNRATE', 'RSAFS']  # high-impact US
    baseline: 'prior'             # naive baseline = prior first-print (random-walk expectation)
    zscore_window: 36             # trailing releases for standardization
    ewma_halflife_days: 5         # daily decay of the surprise pulse into econ_surprise_z
    start: '2015-01-01'
    # USD economic sign of a POSITIVE surprise per series — applied BEFORE the daily sum so a positive
    # econ_surprise_z is a clean USD-positive shock. UNRATE is INVERTED (higher unemployment ⇒ dovish Fed
    # ⇒ USD down). Documented here so it can't silently flip; a series absent from this map defaults +1.
    usd_sign:
      CPIAUCSL:  1    # headline CPI — hot inflation ⇒ hawkish ⇒ USD+
      CPILFESL:  1    # core CPI
      PCEPILFE:  1    # core PCE
      PAYEMS:    1    # nonfarm payrolls — hot jobs ⇒ USD+
      RSAFS:     1    # retail sales — hot consumer ⇒ USD+
      UNRATE:   -1    # unemployment rate — higher ⇒ weak labor ⇒ dovish ⇒ USD-
  # ── COT positioning (CFTC Commitment of Traders — free, keyless, weekly, 1986+) ──
  # LOOK-AHEAD GUARD: COT is measured Tuesday but PUBLISHED ~Friday. Every row is dated to the FRIDAY
  # publish_date (Tuesday + publish_lag); the board only sees it on/after publish. NEVER date to Tuesday.
  cot:
    start: '1986-01-01'
    socrata_dataset: '6dca-aqww'      # CFTC legacy futures-only COT
    publish_lag_days: 3               # Tue measurement → Fri publish (forward-look test asserts publish>measurement)
    percentile_window_weeks: 156      # trailing 3 years — the "extreme" (contrarian) percentile feature
    pairs:                            # FX pair → CFTC contract_market_code (the FOREIGN-currency future vs USD)
      EURUSD: '099741'   # EURO FX
      GBPUSD: '096742'   # BRITISH POUND
      USDJPY: '097741'   # JAPANESE YEN — NB: JPY-long = USDJPY DOWN (inverse; sign handled in the diagnostic)
      AUDUSD: '232741'   # AUSTRALIAN DOLLAR
