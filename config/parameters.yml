# ── Sentiment board-state pipeline (sovereign/sentiment/) — Step 0 data layer ──────────────────────
# Thresholds live here (never hardcoded). VIX regime cutoffs and the news rolling window are config.
sentiment:
  news:
    rolling_window_hours: 48       # rolling sentiment lookback per pair (48h: NewsAPI Developer tier delays ~24h, so 24h window returned 0 articles)
    max_articles: 100              # NewsAPI pageSize per pair query
    # Per-pair topic queries for NewsAPI /v2/everything (OR-joined). Tunable here, not in code.
    pairs:
      EURUSD: ['euro', 'ECB', 'eurozone', 'EUR/USD', 'European Central Bank']
      GBPUSD: ['pound sterling', 'Bank of England', 'GBP/USD', 'UK economy', 'gilt']
      USDJPY: ['Japanese yen', 'Bank of Japan', 'USD/JPY', 'Japan economy', 'BOJ']
      AUDUSD: ['Australian dollar', 'RBA', 'AUD/USD', 'Australia economy', 'Reserve Bank of Australia']
  vix_regime:                      # LOW <low_max, NORMAL [low_max,normal_max], HIGH (normal_max,spike_min], SPIKE >spike_min
    low_max: 15
    normal_max: 25
    spike_min: 30
  vix:
    ticker: '^VIX'                  # yfinance symbol (already used across the repo)
    momentum_lookback_days: 5       # VIX - VIX_5d_ago
  fred:
    series: ['DFF', 'T10Y2Y', 'VIXCLS', 'BAMLH0A0HYM2', 'T10YIE']
    delta_windows: [1, 5]          # business-day deltas computed per series
  macro_start: '2015-01-01'        # FRED/VIX backfill start (full carry history)
  db_path: data/sentiment.db       # DuckDB store, relative to repo root
  # ── Step 1: GDELT texture (free, keyless DOC API; full-history news tone) ──
  gdelt:
    start: '2017-01-01'            # GDELT DOC API coverage begins ~2017
    rate_limit_sec: 5             # GDELT throttles to 1 req / 5s (returns PLAIN-TEXT when exceeded)
    timeout_sec: 30
    max_retries: 3                # backoff retries when the throttle text comes back
    tone_momentum_days: 5         # gdelt_tone_5d = tone_score - tone_score_5d_ago
    pairs:                        # free-text DOC API queries per pair (OR-style), tunable here
      EURUSD: 'ECB eurozone euro'
      GBPUSD: '"Bank of England" pound sterling'
      USDJPY: '"Bank of Japan" yen'
      AUDUSD: '"Reserve Bank of Australia" Australian dollar'
  # ── Step 1: economic-surprise spine (FREE "release innovation" — NOT a consensus surprise) ──
  surprise:
    releases: ['CPIAUCSL', 'CPILFESL', 'PCEPILFE', 'PAYEMS', 'UNRATE', 'RSAFS']  # high-impact US
    baseline: 'prior'             # naive baseline = prior first-print (random-walk expectation)
    zscore_window: 36             # trailing releases for standardization
    ewma_halflife_days: 5         # daily decay of the surprise pulse into econ_surprise_z
    start: '2015-01-01'
    # USD economic sign of a POSITIVE surprise per series — applied BEFORE the daily sum so a positive
    # econ_surprise_z is a clean USD-positive shock. UNRATE is INVERTED (higher unemployment ⇒ dovish Fed
    # ⇒ USD down). Documented here so it can't silently flip; a series absent from this map defaults +1.
    usd_sign:
      CPIAUCSL:  1    # headline CPI — hot inflation ⇒ hawkish ⇒ USD+
      CPILFESL:  1    # core CPI
      PCEPILFE:  1    # core PCE
      PAYEMS:    1    # nonfarm payrolls — hot jobs ⇒ USD+
      RSAFS:     1    # retail sales — hot consumer ⇒ USD+
      UNRATE:   -1    # unemployment rate — higher ⇒ weak labor ⇒ dovish ⇒ USD-
  # ── COT positioning (CFTC Commitment of Traders — free, keyless, weekly, 1986+) ──
  # LOOK-AHEAD GUARD: COT is measured Tuesday but PUBLISHED ~Friday. Every row is dated to the FRIDAY
  # publish_date (Tuesday + publish_lag); the board only sees it on/after publish. NEVER date to Tuesday.
  cot:
    start: '1986-01-01'
    socrata_dataset: '6dca-aqww'      # CFTC legacy futures-only COT
    tff_socrata_dataset: 'gpe5-46if'  # TFF futures-only (leveraged funds) — for currencies "disaggregated"
                                      # = the TFF report; id verified live 2026-07-02
    publish_lag_days: 3               # Tue measurement → Fri publish (forward-look test asserts publish>measurement)
    release_time_et: '15:30'          # CFTC releases Friday 3:30pm ET → release_ts = publish_date + 15:30 (naive ET).
                                      # Holiday weeks slip to Monday (~5/yr): the +3d approximation can run ≤1
                                      # business day EARLY those weeks — documented bias, counted by the auditor.
    percentile_window_weeks: 156      # trailing 3 years — the "extreme" (contrarian) percentile feature
    percentile_window_weeks_1y: 52    # trailing 1 year percentile (min_periods 26)
    zscore_min_periods: 26
    flush_window_weeks: 52            # WoW-delta std window for flush_1w
    pairs:                            # FX pair → CFTC contract_market_code (the FOREIGN-currency future vs USD)
      EURUSD: '099741'   # EURO FX (CME 6E)
      GBPUSD: '096742'   # BRITISH POUND (CME 6B)
      USDJPY: '097741'   # JAPANESE YEN (CME 6J) — NB: JPY-long = USDJPY DOWN (inverse; feeder stays in
                         # currency space, direction rules invert at TEST time per the HYP-072 prereg)
      AUDUSD: '232741'   # AUSTRALIAN DOLLAR (CME 6A)
    currencies:                       # non-pair legs used by crosses
      NZD: '112741'      # NZ DOLLAR (CME 6N)
    crosses:                          # cross positioning: net_spec = base_net − quote_net (contracts),
      AUDNZD:                         # net_oi = base_net_oi − quote_net_oi; open_interest stored 0 (n/a)
        base_code: '232741'
        quote_code: '112741'
  # ── VRP feature (ThetaData FX-ETF options) — sentiment board vrp_* columns ──
  # Weekly (Friday-sampled) ATM implied vol minus trailing realized vol per pair,
  # via currency-ETF option chains (no FX options at ThetaData; ETFs are the proxy).
  # Feeder: sovereign/sentiment/vrp_feed.py — skips LOUDLY when ThetaTerminal is
  # down / key unset (board carries NULL vrp_*, never fabricated).
  vrp:
    dte_target: 30               # target days-to-expiry for the ATM IV read
    dte_min: 25                  # accept expirations in [dte_min, dte_max]
    dte_max: 45
    rv_window: 20                # trailing realized-vol window (trading days)
    percentile_window: 252       # vrp_pct trailing percentile window
    percentile_min_periods: 40   # min observations before a percentile is emitted
    risk_free_rate: 0.04         # Black-76 discounting for the IV inversion
    sample_freq: W-FRI           # weekly sampling anchor (Friday)
    backfill_start: '2016-01-01' # resumable monthly backfill start
    etf:                         # pair -> currency-ETF option underlier
      EURUSD: FXE
      GBPUSD: FXB
      USDJPY: FXY
      AUDUSD: FXA
    spot:                        # pair -> yfinance spot symbol for RV
      EURUSD: EURUSD=X
      GBPUSD: GBPUSD=X
      USDJPY: USDJPY=X
      AUDUSD: AUDUSD=X
  # ── Geometry (G2: corridor / FVG / tri-state) — HYP-082/083/084 substrate ──
  # Trailing-only price-geometry features from the daily OHLC cache (data/research/positioning_family/
  # spot_cache/{PAIR}_ohlc.parquet). Spec'd constants (data/research/preregister/HYP-082/083/084 +
  # the GEOMETRY-2026-07 manifest, commit 01cacbd) — do not alter without re-sealing the hypotheses.
  geometry:
    corridor_window: 120     # trailing bars for the log-price linregress (corridor_r2/corridor_dev)
    fvg_max_age: 20          # trailing bars scanned for 3-bar gaps (fvg_count_20d/fvg_unfilled)
    fvg_min_atr_frac: 0.3    # restates config/ict_params.yml::fvg.min_size_atr_fraction (frozen value)
    tri_window: 20           # trailing bars for the H-L range linregress slope (range_slope)
    tri_pctile: 0.25         # trailing-252d percentile threshold for the "small range" leg of tri_state
    start: '2015-01-01'      # output coverage floor (matches sentiment.macro_start / vrp.backfill_start idiom)

# ── Experience (memory organ) — TICK-005 Library ascension slice ──────────────────────────
# Additive-only block. review_enabled gates the L2a Sunday-review Precedents section (and its
# citation writes); decision_time_enabled gates the L2b precedent_service.py stub (nothing
# imports it yet — flipping this on is a separate, logged future ticket, not this one).
# review_enabled DEVIATION FROM PLAN (documented, see builder report): plan text specifies
# `true`. Found during verification that `true` makes tests/test_experience.py's pre-existing
# carry/ENTER fixture (untouchable — outside this ticket's edit scope) unknowingly match a
# canonical "carry" precedent and write a REAL data/experience/citations.jsonl on every run,
# violating the MANDATORY "never write to real data/ paths from tests" constraint. Off-by-
# default avoids that while remaining a fully spec'd, tested state ("flag-off -> no section +
# no citations" is one of the plan's required test scenarios). Flip to true post-merge as a
# logged param change (CLAUDE.md NON-NEGOTIABLE #4) once reviewed.
experience:
  precedents:
    review_enabled: false
    decision_time_enabled: false
    top_k: 3

# ── Platform: system regime contract (platform/ neutral connective layer) ──────────────────────────
# Config for scripts/build_system_regime.py + platform/regime_client.py. New keys logged to
# data/agent/param_change_log.jsonl (CLAUDE.md NN#4). NOT risk caps — freshness/staleness limits and
# the reader's whole-file age guard. Carry/VIX thresholds are READ from existing keys
# (hard_constraints.vix_extreme_threshold), not duplicated here.
platform:
  regime:
    # Per-source staleness limit (hours). A source older than this downgrades its
    # section to STALE and forces that strategy's verdict to STAND_ASIDE.
    freshness_hours:
      carry: 12.0       # forex_proximity.json — same-session read; 12h avoids false-STALE between scans
      es_nq: 12.0       # nqes_regime.json — research cadence
      macro: 12.0       # macro_snapshot.json — daily-ish macro series
    # Client-side whole-contract age guard (hours): regime_client forces every read
    # STALE if system_regime_state.json is older than this (writer runs every 30 min;
    # 1.5h = 3 missed runs). Mirrored by ALTA_REGIME_MAX_AGE_HOURS env default.
    contract_max_age_hours: 1.5
  # ── The conscience (measurement layer). specs/measurement_layer.md. ────────────────
  # Config for scripts/build_system_health.py + alta_platform/health_client.py. NOT risk
  # caps — measurement thresholds. Risk caps themselves are READ from RISK_CONSTITUTION.md
  # / hard_constraints, never duplicated here. New keys logged to param_change_log.jsonl.
  health:
    freshness_hours:
      shadow: 96.0        # shadow_daily.jsonl — appended on trading days; 4d tolerates weekends/gaps
      gauntlet: 720.0     # verdicts.json — a backtest artifact, refreshed on re-runs (~monthly)
      regime: 1.5         # system_regime_state.json — the conscience reads the regime organ's freshness
    contract_max_age_hours: 1.5   # health_client whole-file age guard (writer every 30 min = 3 missed runs)
    edge_health:
      n_needed_default: 250       # live signals needed before an edge can read "healthy" (not 3 trades)
      divergence_R_threshold: 0.5 # |live - backtest| expectancy (R) past this → divergence flag / HALT
    process_adherence:
      min_sample: 20              # ENTERED setups (w/ determinable bias alignment / closed outcome)
                                  # needed before process-adherence & read-accuracy publish a number;
                                  # below this → INSUFFICIENT_DATA (Layer-8 causal-chain journal)
    # Kill-switch HALT on consecutive drawdown-breaker hits. Ladder lives in RISK_CONSTITUTION.md
    # Art. 3 (3.5/5/6.5); this is the count of consecutive breaker trips that forces HALT.
    consecutive_breaker_halt_n: 2
