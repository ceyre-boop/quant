# ── EDGAR client (SEC rate-limit compliance) ─────────────────────────────────
edgar:
  user_agent: "Alta Research colineyre222@gmail.com"
  request_sleep_sec: 1.0            # SEC fair-access: >= 1s between requests
  max_retries: 3
  backoff_base_sec: 2.0             # exponential backoff on 429
  form4_lookback_days: 5
  activist_lookback_days: 7
  full_text_search: "https://efts.sec.gov/LATEST/search-index"

# ── Output paths ─────────────────────────────────────────────────────────────
paths:
