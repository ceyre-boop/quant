  universe: "data/agent/gate_universe.json"
  scan_history: "data/agent/gate_scan_history.jsonl"     # append-only, tier 2+
  calibration_log: "data/agent/gate_calibration.jsonl"   # append-only outcomes
  param_change_log: "data/agent/param_change_log.jsonl"
