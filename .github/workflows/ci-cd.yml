name: CI/CD - Test and Deploy

on:
  push:
    branches: [main, develop]
    paths:
      - 'quant/clawd_trading/**'
      - '.github/workflows/ci-cd.yml'
  pull_request:
    branches: [main]
    paths:
      - 'quant/clawd_trading/**'

env:
  PYTHON_VERSION: '3.11'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./quant/clawd_trading
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov black flake8 mypy
      
      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Format check with black
        run: black --check . || true
      
      - name: Type check with mypy
        run: mypy . --ignore-missing-imports || true
      
      - name: Run tests with pytest
        run: |
          pytest tests/ -v --cov=. --cov-report=xml --cov-report=html
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.run_id }}
          path: quant/clawd_trading/htmlcov/
          retention-days: 7

  deploy-firebase:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Firebase CLI
        run: npm install -g firebase-tools
      
      - name: Deploy Firebase Functions
        run: |
          cd quant/clawd_trading/firebase/functions
          npm install
          firebase deploy --only functions --token ${{ secrets.FIREBASE_TOKEN }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
      
      - name: Verify deployment
        run: |
          echo "Firebase deployment complete"
          echo "Checking Firebase Functions health..."
          # Add health check here if needed

  notify:
    needs: [test, deploy-firebase]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Notify success
        if: ${{ needs.test.result == 'success' && needs.deploy-firebase.result == 'success' }}
        run: |
          echo "✅ All tests passed and deployment successful!"
      
      - name: Notify failure
        if: ${{ needs.test.result == 'failure' || needs.deploy-firebase.result == 'failure' }}
        run: |
          echo "❌ Tests or deployment failed!"
          exit 1
