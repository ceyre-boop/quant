name: Deploy
on:
  push:
    branches: [master]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build combined site
        run: |
          mkdir -p _site/ict _site/data/agent _site/data/forensics
          # Dashboard assets (css, js, data from legacy dashboard folder)
          cp -r dashboard/. _site/
          # Override root with new multi-tab SPA
          cp index.html _site/index.html
          # ICT oracle assets from ict-dashboard, then override with new oracle
          cp -r ict-dashboard/. _site/ict/
          cp ict/index.html _site/ict/index.html
          # Copy committed data snapshots if present
          cp data/agent/*.json _site/data/agent/ 2>/dev/null || true
          cp data/forensics/cross_system_state.json _site/data/forensics/ 2>/dev/null || true
          mkdir -p _site/data/oracle/reflections
          cp data/oracle/latest_reflection.json _site/data/oracle/ 2>/dev/null || true
          cp data/oracle/version_history.json _site/data/oracle/ 2>/dev/null || true
          cp data/oracle/reflections/[0-9]*.json _site/data/oracle/reflections/ 2>/dev/null || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'
      - uses: actions/deploy-pages@v4
        id: deployment
