name: Deploy
on:
  push:
    branches: [master]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build combined site
        run: |
          mkdir -p _site/ict
          cp -r dashboard/. _site/
          cp -r ict-dashboard/. _site/ict/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'
      - uses: actions/deploy-pages@v4
        id: deployment
