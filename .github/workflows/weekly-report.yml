name: Weekly Performance Report

on:
  schedule:
    # Run every Monday at 9:00 AM EST (2:00 PM UTC)
    - cron: '0 14 * * 1'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  generate-report:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./quant/clawd_trading
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Calculate weekly metrics
        id: metrics
        run: |
          python meta_evaluator/performance_monitor.py --period weekly --output weekly_report.json
          
          # Format for GitHub summary
          echo "## 📊 Weekly Performance Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Sharpe Ratio | $(jq -r '.sharpe_ratio' weekly_report.json) |" >> $GITHUB_STEP_SUMMARY
          echo "| Win Rate | $(jq -r '.win_rate' weekly_report.json)% |" >> $GITHUB_STEP_SUMMARY
          echo "| Max Drawdown | $(jq -r '.max_drawdown' weekly_report.json)% |" >> $GITHUB_STEP_SUMMARY
          echo "| Total Trades | $(jq -r '.total_trades' weekly_report.json) |" >> $GITHUB_STEP_SUMMARY
          echo "| Avg Trade | $(jq -r '.avg_trade_pnl' weekly_report.json) |" >> $GITHUB_STEP_SUMMARY
          
          # Check for model drift
          DRIFT=$(jq -r '.model_drift_detected' weekly_report.json)
          if [ "$DRIFT" = "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Model drift detected!** Consider retraining." >> $GITHUB_STEP_SUMMARY
          fi
      
      - name: Push metrics to Firebase
        run: |
          python -c "
          import json
          import os
          from integration.firebase_client import FirebaseClient
          
          with open('weekly_report.json', 'r') as f:
              metrics = json.load(f)
          
          client = FirebaseClient()
          week_id = metrics['week_ending']
          client.rtdb_update(f'/performance/weekly_metrics/{week_id}', metrics)
          print(f'Pushed metrics for week ending {week_id}')
          "
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      
      - name: Archive report
        uses: actions/upload-artifact@v4
        with:
          name: weekly-report-${{ github.run_id }}
          path: weekly_report.json
          retention-days: 90
      
      - name: Create GitHub Issue for significant events
        if: ${{ steps.metrics.outputs.sharpe < 1.0 || steps.metrics.outputs.max_drawdown > -10 }}
        uses: actions/github-script@v7
        with:
          script: |
            const title = `📉 Performance Alert - Week of ${new Date().toISOString().split('T')[0]}`;
            const body = `## Weekly Performance Below Thresholds
            
            - Sharpe Ratio: ${{ steps.metrics.outputs.sharpe }} (target: > 1.0)
            - Max Drawdown: ${{ steps.metrics.outputs.max_drawdown }}% (limit: < -10%)
            
            ### Recommended Actions
            - [ ] Review recent trades for anomalies
            - [ ] Check market regime changes
            - [ ] Consider model retraining
            - [ ] Verify risk parameters
            
            See full report: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['performance', 'automated']
            });
