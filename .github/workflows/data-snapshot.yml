name: Weekly Data Snapshot

on:
  schedule:
    - cron: '0 5 * * 0'  # Sunday 12 AM EST (5 AM UTC)
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  snapshot:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy pyarrow
    
    - name: Fetch market data snapshot
      env:
        POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      run: |
        python -c "
        import pandas as pd
        from datetime import datetime, timedelta
        
        # Would fetch actual data from data pipeline
        # For now, create sample snapshot structure
        
        snapshot_date = datetime.now().strftime('%Y-%m-%d')
        
        # Create sample data structure
        data = {
            'timestamp': [datetime.now().isoformat()],
            'symbol': ['NAS100'],
            'price': [21905.0],
            'volume': [1000000],
            'volatility': [0.015],
            'regime': ['NORMAL']
        }
        
        df = pd.DataFrame(data)
        df.to_parquet(f'data_snapshot/market_features_{snapshot_date}.parquet')
        
        # Save metadata
        import json
        metadata = {
            'snapshot_date': snapshot_date,
            'symbols': ['NAS100', 'US30', 'SPX500'],
            'features_count': 43,
            'created_at': datetime.now().isoformat()
        }
        
        with open(f'data_snapshot/metadata_{snapshot_date}.json', 'w') as f:
            json.dump(metadata, f, indent=2)
        
        print(f'Created snapshot for {snapshot_date}')
        "
    
    - name: Upload snapshot artifact
      uses: actions/upload-artifact@v4
      with:
        name: data-snapshot-${{ github.run_id }}
        path: data_snapshot/
        retention-days: 365
    
    - name: Commit snapshot to repo
      run: |
        SNAPSHOT_DATE=$(date +%Y-%m-%d)
        
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        git add data_snapshot/
        git diff --staged --quiet || git commit -m "data: weekly snapshot $SNAPSHOT_DATE"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
