name: Data Snapshot

on:
  schedule:
    # Run every Sunday at 11:00 PM EST (4:00 AM UTC Monday)
    - cron: '0 4 * * 1'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.11'

jobs:
  snapshot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./quant/clawd_trading
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pandas pyarrow  # For parquet support
      
      - name: Generate data snapshot
        run: |
          python -c "
          import pandas as pd
          import os
          from datetime import datetime
          from data.pipeline import DataPipeline
          
          # Create snapshot directory
          snapshot_dir = f'data_snapshots/{datetime.now().strftime(\"%Y_%m_%d\")}'
          os.makedirs(snapshot_dir, exist_ok=True)
          
          # Fetch all data
          pipeline = DataPipeline()
          
          # Save market features
          features = pipeline.get_latest_features(symbols=['NQ', 'ES', 'BTC'])
          features.to_parquet(f'{snapshot_dir}/market_features.parquet')
          
          # Save signal history
          signals = pipeline.get_signal_history(days=30)
          signals.to_parquet(f'{snapshot_dir}/signal_history.parquet')
          
          # Save position history
          positions = pipeline.get_position_history(days=30)
          positions.to_parquet(f'{snapshot_dir}/position_history.parquet')
          
          # Create metadata
          metadata = {
              'snapshot_date': datetime.now().isoformat(),
              'symbols': ['NQ', 'ES', 'BTC'],
              'feature_count': len(features.columns),
              'signal_count': len(signals),
              'position_count': len(positions)
          }
          pd.Series(metadata).to_json(f'{snapshot_dir}/metadata.json')
          
          print(f'Snapshot created: {snapshot_dir}')
          print(f'Features: {metadata[\"feature_count\"]} cols')
          print(f'Signals: {metadata[\"signal_count\"]} rows')
          print(f'Positions: {metadata[\"position_count\"]} rows')
          "
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      
      - name: Commit snapshot
        run: |
          cd ../..
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          SNAPSHOT_DATE=$(date +%Y_%m_%d)
          git add "quant/clawd_trading/data_snapshots/${SNAPSHOT_DATE}/"
          
          git commit -m "data: weekly snapshot ${SNAPSHOT_DATE}

- Market features
- Signal history (30 days)
- Position history (30 days)
- Metadata and provenance

Auto-generated by data snapshot workflow" || echo "No changes to commit"
          
          git push
      
      - name: Upload snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: data-snapshot-${{ github.run_id }}
          path: quant/clawd_trading/data_snapshots/
          retention-days: 30
