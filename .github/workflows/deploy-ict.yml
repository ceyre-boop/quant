name: Deploy ICT Dashboard
on:
  push:
    branches: [ict-engine]
    paths: ["ict-dashboard/**"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ict-engine
      - name: Assemble site (Sovereign + ICT subfolder)
        run: |
          mkdir -p _site/ict
          cp -r dashboard/. _site/
          cp -r ict-dashboard/. _site/ict/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - uses: actions/deploy-pages@v4
        id: deployment
