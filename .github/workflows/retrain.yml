name: Nightly Model Retrain

on:
  schedule:
    # 2:00 AM EST every weekday (7:00 AM UTC)
    - cron: '0 7 * * 1-5'
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install -r clawd_trading/requirements.txt
        pip install firebase-admin
        
    - name: Check if refit is flagged
      id: check-refit
      env:
        FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
      run: |
        python << 'EOF'
        import os
        import json
        try:
            from firebase_admin import credentials, initialize_app, db
            cred = credentials.Certificate(json.loads(os.environ.get('FIREBASE_SERVICE_ACCOUNT', '{}')))
            initialize_app(cred, {'databaseURL': os.environ['FIREBASE_DATABASE_URL']})
            ref = db.reference('trading_state/model/refit_flagged')
            refit = ref.get()
            print(f"::set-output name=refit::{refit}")
        except Exception as e:
            print(f"Error checking refit: {e}")
            print("::set-output name=refit::false")
        EOF
      continue-on-error: true
        
    - name: Run model retrain
      if: steps.check-refit.outputs.refit == 'true'
      env:
        POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
      run: |
        cd clawd_trading
        python layer1/bias_model/train.py --symbol NAS100
        
    - name: Commit new model
      if: steps.check-refit.outputs.refit == 'true'
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add clawd_trading/models/
        git commit -m "Auto: Retrain model $(date +%Y-%m-%d)" || echo "No changes"
        git push
