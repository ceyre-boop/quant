name: Nightly Model Retraining

on:
  schedule:
    # Run at 2:00 AM EST (7:00 AM UTC) every day
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      model_type:
        description: 'Model to retrain (bias|risk|game|all)'
        required: true
        default: 'all'

env:
  PYTHON_VERSION: '3.11'
  FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
  POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
  TRADELOCKER_API_KEY: ${{ secrets.TRADELOCKER_API_KEY }}

jobs:
  retrain:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./clawd_trading
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true  # For model files
      
      - name: Check required secrets
        id: check_secrets
        run: |
          if [ -z "$POLYGON_API_KEY" ] || [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ Required secrets (POLYGON_API_KEY, FIREBASE_SERVICE_ACCOUNT) are not configured. Skipping retraining."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      
      - name: Set up Python
        if: steps.check_secrets.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r ../../requirements.txt
          pip install firebase-admin shap xgboost pandas numpy scikit-learn
      
      - name: Download latest data
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, os.path.abspath('../..'))
          from data.pipeline import DataPipeline
          pipeline = DataPipeline()
          pipeline.fetch_all(symbols=['NQ', 'ES', 'BTC'])
          "
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      
      - name: Run model retraining
        if: steps.check_secrets.outputs.skip != 'true'
        id: retrain
        run: |
          python meta_evaluator/refit_scheduler.py --model ${{ github.event.inputs.model_type || 'all' }} --commit-results
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
      
      - name: Evaluate model performance
        if: steps.check_secrets.outputs.skip != 'true'
        id: evaluate
        run: |
          python meta_evaluator/performance_monitor.py --output metrics.json
          
          # Extract metrics for GitHub output
          echo "sharpe=$(jq -r '.sharpe_ratio' metrics.json)" >> $GITHUB_OUTPUT
          echo "winrate=$(jq -r '.win_rate' metrics.json)" >> $GITHUB_OUTPUT
          echo "drawdown=$(jq -r '.max_drawdown' metrics.json)" >> $GITHUB_OUTPUT
      
      - name: Commit new model
        if: steps.check_secrets.outputs.skip != 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # Stage model files
          git add ../../models/
          git add meta_evaluator/metrics/
          
          # Get version from latest model
          MODEL_VERSION=$(ls -t ../../models/bias_engine_v*.pkl 2>/dev/null | head -1 | grep -oE 'v[0-9]+' || echo 'v1')
          
          # Create commit with metrics
          git commit -m "model: bias_engine_${MODEL_VERSION} (trained $(date +%Y-%m-%d))

- Sharpe: ${{ steps.evaluate.outputs.sharpe }}
- Winrate: ${{ steps.evaluate.outputs.winrate }}%
- Max Drawdown: ${{ steps.evaluate.outputs.drawdown }}%

Auto-generated by nightly retraining workflow" || echo "No changes to commit"
          
          git push
      
      - name: Upload metrics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: training-metrics-${{ github.run_id }}
          path: |
            clawd_trading/metrics.json
            models/*.pkl
          retention-days: 30
      
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Nightly retraining failed! Check logs for details."
          # Could add Slack/Telegram notification here
