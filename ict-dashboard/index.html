<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALTA — Research Intelligence</title>
<style>
  :root {
    --bg:        #0a0a0a;
    --bg2:       #111111;
    --bg3:       #161616;
    --border:    #222222;
    --text:      #c8c8c8;
    --muted:     #555555;
    --green:     #00c896;
    --yellow:    #f5c518;
    --red:       #e05252;
    --blue:      #4a9eff;
    --orange:    #f4923a;
    --purple:    #b06cff;
    --accent:    #00c896;
    --font:      'Courier New', Courier, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── TOP HEADER ─────────────────────────────────────────── */
  #header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #header .logo {
    color: var(--green);
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 3px;
  }
  #header .tagline {
    color: var(--muted);
    font-size: 11px;
  }
  #header .timestamp {
    color: var(--muted);
    font-size: 11px;
  }
  #reload-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--green);
    font-family: var(--font);
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    letter-spacing: 1px;
  }
  #reload-btn:hover { border-color: var(--green); }

  /* ── GRID LAYOUT ─────────────────────────────────────────── */
  #grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    grid-template-rows: auto;
    gap: 1px;
    background: var(--border);
    padding: 1px;
    min-height: calc(100vh - 46px);
  }

  .panel {
    background: var(--bg);
    padding: 14px 16px;
    overflow: hidden;
  }
  .panel.full-width  { grid-column: 1 / -1; }
  .panel.half-width  { grid-column: span 2; }

  .panel-title {
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    padding-bottom: 6px;
    margin-bottom: 10px;
  }

  /* ── HEALTH GRID ─────────────────────────────────────────── */
  .health-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .health-item {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .health-item .h-name  { font-size: 11px; color: var(--muted); }
  .health-item .h-status{ font-size: 12px; font-weight: bold; }
  .health-item .h-detail{ font-size: 10px; color: var(--muted); }

  /* ── STATUS COLORS ──────────────────────────────────────── */
  .GREEN  { color: var(--green); }
  .YELLOW { color: var(--yellow); }
  .RED    { color: var(--red); }
  .UNKNOWN{ color: var(--muted); }
  .CONFIRMED { color: var(--green); }
  .REJECTED  { color: var(--red); }
  .TESTING   { color: var(--yellow); }
  .QUEUED    { color: var(--blue); }

  /* ── MESSAGES ────────────────────────────────────────────── */
  .message {
    display: flex;
    gap: 8px;
    padding: 8px 10px;
    border-left: 2px solid var(--border);
    margin-bottom: 6px;
    background: var(--bg2);
  }
  .message.URGENT    { border-color: var(--red); }
  .message.IMPORTANT { border-color: var(--yellow); }
  .message.FYI       { border-color: var(--green); }
  .message .msg-emoji { font-size: 14px; flex-shrink: 0; }
  .message .msg-body  { font-size: 12px; }
  .message .msg-time  { color: var(--muted); font-size: 10px; margin-top: 2px; }

  /* ── HYPOTHESIS TABLE ───────────────────────────────────── */
  .hyp-table { width: 100%; border-collapse: collapse; }
  .hyp-table th {
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 1px;
    text-align: left;
    padding: 4px 8px;
    border-bottom: 1px solid var(--border);
  }
  .hyp-table td {
    padding: 5px 8px;
    font-size: 11px;
    border-bottom: 1px solid var(--bg2);
  }
  .hyp-table tr:hover td { background: var(--bg2); }

  /* ── RESEARCH QUEUE ─────────────────────────────────────── */
  .queue-item {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    gap: 8px;
    align-items: start;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .queue-item:last-child { border-bottom: none; }
  .q-priority { color: var(--yellow); font-size: 12px; font-weight: bold; }
  .q-name     { font-size: 12px; }
  .q-desc     { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .q-status   { font-size: 10px; padding: 2px 6px; border: 1px solid; }
  .q-status.QUEUED  { color: var(--blue); border-color: var(--blue); }
  .q-status.RUNNING { color: var(--yellow); border-color: var(--yellow); }
  .q-status.DONE    { color: var(--green); border-color: var(--green); }
  .q-status.ERROR   { color: var(--red); border-color: var(--red); }

  /* ── VERSION TRACKER ─────────────────────────────────────── */
  .version-tracker { }
  .version-row {
    display: grid;
    grid-template-columns: 60px 1fr 70px;
    gap: 8px;
    align-items: center;
    margin-bottom: 6px;
  }
  .v-label  { font-size: 11px; color: var(--muted); }
  .v-bar-bg { background: var(--bg2); height: 14px; position: relative; }
  .v-bar    { height: 100%; background: var(--green); opacity: 0.7; }
  .v-bar.current { background: var(--accent); opacity: 1; }
  .v-bar.target  { background: transparent; border-right: 2px solid var(--yellow); position: absolute; height: 100%; top: 0; }
  .v-sharpe { font-size: 11px; text-align: right; }

  /* ── USAGE PANEL ─────────────────────────────────────────── */
  .usage-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 8px;
  }
  .usage-stat {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 8px 10px;
  }
  .usage-stat .u-label { font-size: 10px; color: var(--muted); }
  .usage-stat .u-value { font-size: 16px; font-weight: bold; margin-top: 2px; }
  .usage-stat .u-sub   { font-size: 10px; color: var(--muted); }
  .mode-badge {
    display: inline-block;
    padding: 2px 8px;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 1px;
  }
  .mode-NORMAL  { color: var(--green); border: 1px solid var(--green); }
  .mode-LIGHT   { color: var(--yellow); border: 1px solid var(--yellow); }
  .mode-DANGER  { color: var(--red); border: 1px solid var(--red); }
  .mode-UNKNOWN { color: var(--muted); border: 1px solid var(--muted); }

  /* ── WARNING BANNER ─────────────────────────────────────── */
  #usage-warning {
    display: none;
    background: rgba(224, 82, 82, 0.1);
    border: 1px solid var(--red);
    color: var(--red);
    padding: 8px 16px;
    font-size: 11px;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  /* ── SPINNER / LOADING ──────────────────────────────────── */
  .loading { color: var(--muted); font-size: 11px; }

  /* ── EMPTY STATE ─────────────────────────────────────────── */
  .empty { color: var(--muted); font-size: 11px; font-style: italic; }

  /* ── SCROLLABLE ─────────────────────────────────────────── */
  .scrollable { max-height: 340px; overflow-y: auto; }
  .scrollable::-webkit-scrollbar { width: 4px; }
  .scrollable::-webkit-scrollbar-thumb { background: var(--border); }

  /* ── OVERALL HEALTH BADGE ─────────────────────────────────── */
  .overall-badge {
    font-size: 13px;
    font-weight: bold;
    padding: 2px 8px;
    border: 1px solid;
    margin-bottom: 8px;
    display: inline-block;
  }
</style>
</head>
<body>

<div id="header">
  <div>
    <div class="logo">ALTA — SOVEREIGN</div>
    <div class="tagline">Research Intelligence Dashboard</div>
  </div>
  <div style="display:flex;gap:12px;align-items:center;">
    <span class="timestamp" id="last-refresh">Loading...</span>
    <button id="reload-btn" onclick="loadAll()">↻ RELOAD</button>
  </div>
</div>

<div id="usage-warning">
  ⚠ LOW WEEKLY USAGE REMAINING — Agent switching to LIGHT mode
</div>

<div id="grid">

  <!-- Row 1: System Health (full width) -->
  <div class="panel full-width" id="panel-health">
    <div class="panel-title">System Health</div>
    <div class="loading">Loading...</div>
  </div>

  <!-- Row 2: Messages (left 2/3) | Usage (right 1/3) -->
  <div class="panel half-width" id="panel-messages">
    <div class="panel-title">Messages to Colin</div>
    <div class="loading">Loading...</div>
  </div>

  <div class="panel" id="panel-usage">
    <div class="panel-title">Session Usage</div>
    <div class="loading">Loading...</div>
  </div>

  <!-- Row 3: Hypothesis Ledger (full width) -->
  <div class="panel full-width" id="panel-hypotheses">
    <div class="panel-title">Hypothesis Ledger</div>
    <div class="loading">Loading...</div>
  </div>

  <!-- Row 4: Research Queue (left 2/3) | Version Tracker (right 1/3) -->
  <div class="panel half-width" id="panel-queue">
    <div class="panel-title">Research Queue</div>
    <div class="loading">Loading...</div>
  </div>

  <div class="panel" id="panel-versions">
    <div class="panel-title">Version Tracker — Sharpe Progress</div>
    <div class="loading">Loading...</div>
  </div>

</div>

<script>
// ── DATA PATHS (relative to this HTML file location) ─────────────────────────
// Adjust if you open this from a different directory
const DATA_BASE = "../data/agent/";

const FILES = {
  health:     DATA_BASE + "health.json",
  messages:   DATA_BASE + "messages_to_colin.json",
  usage:      DATA_BASE + "usage.json",
  hypotheses: DATA_BASE + "hypothesis_ledger.json",
  queue:      DATA_BASE + "research_queue.json",
};

// ── VERSION DATA (static — update manually or from findings) ──────────────────
const VERSIONS = [
  { label: "v001", sharpe: 0.1785, color: "#e05252" },
  { label: "v002", sharpe: 0.3551, color: "#f4923a" },
  { label: "v002.5", sharpe: 0.38, color: "#f5c518" },
  { label: "v003", sharpe: 0.4523, color: "#f5c518" },
  { label: "v004", sharpe: 0.6260, color: "#00c896" },
  { label: "current", sharpe: 0.8011, color: "#00c896", current: true },
];
const TARGET_SHARPE = 1.5;

// ── FETCH JSON ────────────────────────────────────────────────────────────────
async function fetchJSON(path) {
  try {
    const r = await fetch(path + "?t=" + Date.now());
    if (!r.ok) return null;
    return await r.json();
  } catch (e) {
    return null;
  }
}

// ── RENDER: HEALTH ────────────────────────────────────────────────────────────
function renderHealth(data) {
  const el = document.getElementById("panel-health");
  if (!data || !data.components) {
    el.innerHTML = '<div class="panel-title">System Health</div><div class="empty">No health data — run agent_scheduler.py --health</div>';
    return;
  }

  const overall = data.overall || "UNKNOWN";
  const checked = data.last_checked ? new Date(data.last_checked).toLocaleTimeString() : "never";

  let items = "";
  for (const [name, comp] of Object.entries(data.components)) {
    const status = comp.status || "UNKNOWN";
    const detail = comp.detail || "—";
    items += `
      <div class="health-item">
        <div class="h-name">${name.toUpperCase().replace(/_/g," ")}</div>
        <div class="h-status ${status}">${status}</div>
        <div class="h-detail">${detail}</div>
      </div>`;
  }

  el.innerHTML = `
    <div class="panel-title">System Health
      <span class="overall-badge ${overall}" style="margin-left:8px;font-size:11px;border-color:${overall==='GREEN'?'var(--green)':overall==='YELLOW'?'var(--yellow)':'var(--red)'}">● ${overall}</span>
      <span style="color:var(--muted);font-size:10px;margin-left:8px;">checked ${checked}</span>
    </div>
    <div class="health-grid">${items}</div>`;
}

// ── RENDER: MESSAGES ──────────────────────────────────────────────────────────
function renderMessages(data) {
  const el = document.getElementById("panel-messages");
  const header = '<div class="panel-title">Messages to Colin</div>';

  if (!data || !data.messages || data.messages.length === 0) {
    el.innerHTML = header + '<div class="empty">No messages yet.</div>';
    return;
  }

  const msgs = data.messages.slice(0, 15).map(m => {
    const time = m.timestamp ? new Date(m.timestamp).toLocaleString() : "";
    return `
      <div class="message ${m.priority}">
        <div class="msg-emoji">${m.emoji || "🟢"}</div>
        <div>
          <div class="msg-body">${m.text}</div>
          <div class="msg-time">${time}</div>
        </div>
      </div>`;
  }).join("");

  el.innerHTML = header + `<div class="scrollable">${msgs}</div>`;
}

// ── RENDER: USAGE ─────────────────────────────────────────────────────────────
function renderUsage(data) {
  const el = document.getElementById("panel-usage");
  const header = '<div class="panel-title">Session Usage</div>';

  if (!data) {
    el.innerHTML = header + '<div class="empty">No usage data — run claude_usage_tracker.py</div>';
    return;
  }

  const mode        = data.mode || "UNKNOWN";
  const w           = data.week || {};
  const t           = data.today || {};
  const weeklyUsed  = (w.weekly_used || 0).toLocaleString();
  const weeklyLeft  = (w.weekly_remaining || 0).toLocaleString();
  const agentAllow  = (t.agent_allowed_today || 0).toLocaleString();
  const humanUsed   = (t.human_used || 0).toLocaleString();
  const lastSync    = w.last_synced ? new Date(w.last_synced).toLocaleTimeString() : "never";
  const weekPct     = Math.round((w.weekly_used || 0) / (data.meta?.weekly_total_estimate || 200000) * 100);

  // Show warning banner if danger
  const warningEl = document.getElementById("usage-warning");
  if ((w.weekly_remaining || 200000) < 20000) {
    warningEl.style.display = "block";
  }

  el.innerHTML = `
    ${header}
    <div style="margin-bottom:10px;">
      <span class="mode-badge mode-${mode}">${mode}</span>
      <span style="color:var(--muted);font-size:10px;margin-left:8px;">synced ${lastSync}</span>
    </div>
    <div class="usage-grid">
      <div class="usage-stat">
        <div class="u-label">WEEKLY USED</div>
        <div class="u-value" style="color:var(--text)">${weeklyUsed}</div>
        <div class="u-sub">${weekPct}% of est. 200k</div>
      </div>
      <div class="usage-stat">
        <div class="u-label">WEEKLY LEFT</div>
        <div class="u-value" style="color:var(--green)">${weeklyLeft}</div>
        <div class="u-sub">tokens remaining</div>
      </div>
      <div class="usage-stat">
        <div class="u-label">TODAY HUMAN</div>
        <div class="u-value" style="color:var(--blue)">${humanUsed}</div>
        <div class="u-sub">of ${(t.daily_human_budget||20000).toLocaleString()} budget</div>
      </div>
      <div class="usage-stat">
        <div class="u-label">AGENT ALLOWED</div>
        <div class="u-value" style="color:var(--accent)">${agentAllow}</div>
        <div class="u-sub">incl. ${(t.agent_extra_from_rollover||0).toLocaleString()} rollover</div>
      </div>
    </div>
    <div style="margin-top:10px;color:var(--muted);font-size:10px;">
      SYNC: python3 sovereign/tools/claude_usage_tracker.py sync --used &lt;n&gt;
    </div>`;
}

// ── RENDER: HYPOTHESES ────────────────────────────────────────────────────────
function renderHypotheses(data) {
  const el = document.getElementById("panel-hypotheses");
  const header = '<div class="panel-title">Hypothesis Ledger</div>';

  if (!data || !data.ledger) {
    el.innerHTML = header + '<div class="empty">No hypothesis data.</div>';
    return;
  }

  const statusIcon = { CONFIRMED:"✅", REJECTED:"❌", TESTING:"🔄", QUEUED:"📋" };
  const order = { TESTING:0, QUEUED:1, CONFIRMED:2, REJECTED:3 };
  const sorted = [...data.ledger].sort((a,b) => (order[a.status]||4) - (order[b.status]||4));

  const rows = sorted.map(h => `
    <tr>
      <td style="color:var(--muted)">${h.id}</td>
      <td>${statusIcon[h.status] || "?"} <span class="${h.status}">${h.status}</span></td>
      <td>${h.name}</td>
      <td style="color:var(--muted)">${h.result || "—"}</td>
      <td style="color:var(--muted)">${h.date || "—"}</td>
    </tr>`).join("");

  el.innerHTML = `
    ${header}
    <div class="scrollable">
      <table class="hyp-table">
        <thead>
          <tr>
            <th>ID</th><th>STATUS</th><th>HYPOTHESIS</th><th>RESULT</th><th>DATE</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ── RENDER: QUEUE ─────────────────────────────────────────────────────────────
function renderQueue(data) {
  const el = document.getElementById("panel-queue");
  const header = '<div class="panel-title">Research Queue</div>';

  if (!data || !data.queue) {
    el.innerHTML = header + '<div class="empty">No queue data.</div>';
    return;
  }

  const items = data.queue.map(t => `
    <div class="queue-item">
      <div class="q-priority">${t.priority}</div>
      <div>
        <div class="q-name">${t.name}</div>
        <div class="q-desc">${t.description}</div>
        ${t.blocked_until ? `<div style="color:var(--red);font-size:10px;">⏸ blocked until: ${t.blocked_until}</div>` : ""}
      </div>
      <div>
        <span class="q-status ${t.status}">${t.status}</span>
        <div style="color:var(--muted);font-size:10px;margin-top:2px">${t.estimated_minutes || "?"}min</div>
      </div>
    </div>`).join("");

  el.innerHTML = header + `<div class="scrollable">${items}</div>`;
}

// ── RENDER: VERSION TRACKER ───────────────────────────────────────────────────
function renderVersions() {
  const el = document.getElementById("panel-versions");
  const header = '<div class="panel-title">Version Tracker — Sharpe Progress</div>';

  const maxSharpe = Math.max(TARGET_SHARPE, ...VERSIONS.map(v => v.sharpe)) * 1.05;

  const rows = VERSIONS.map(v => {
    const pct = Math.round(v.sharpe / maxSharpe * 100);
    const cls = v.current ? "current" : "";
    const color = v.sharpe < 0.4 ? "var(--red)" : v.sharpe < 0.6 ? "var(--yellow)" : "var(--green)";
    return `
      <div class="version-row">
        <div class="v-label" style="${v.current ? 'color:var(--accent);font-weight:bold;' : ''}">${v.label}</div>
        <div class="v-bar-bg">
          <div class="v-bar ${cls}" style="width:${pct}%;background:${color};"></div>
          <div class="v-bar target" style="left:${Math.round(TARGET_SHARPE/maxSharpe*100)}%"></div>
        </div>
        <div class="v-sharpe" style="${v.current ? 'color:var(--accent);font-weight:bold;' : ''}">${v.sharpe.toFixed(3)}</div>
      </div>`;
  }).join("");

  const targetPct = Math.round(TARGET_SHARPE / maxSharpe * 100);

  el.innerHTML = `
    ${header}
    <div style="color:var(--muted);font-size:10px;margin-bottom:8px;">
      Target: <span style="color:var(--yellow)">${TARGET_SHARPE}</span> (institutional grade)
      | Progress: <span style="color:var(--green)">${((0.8011/TARGET_SHARPE)*100).toFixed(0)}%</span>
    </div>
    ${rows}
    <div style="margin-top:8px;color:var(--muted);font-size:10px;">
      ▌ = target ${TARGET_SHARPE} Sharpe | current: 0.8011 | gap: ${(TARGET_SHARPE - 0.8011).toFixed(4)}
    </div>`;
}

// ── LOAD ALL ──────────────────────────────────────────────────────────────────
async function loadAll() {
  document.getElementById("last-refresh").textContent =
    "Refreshing... " + new Date().toLocaleTimeString();

  const [health, messages, usage, hypotheses, queue] = await Promise.all([
    fetchJSON(FILES.health),
    fetchJSON(FILES.messages),
    fetchJSON(FILES.usage),
    fetchJSON(FILES.hypotheses),
    fetchJSON(FILES.queue),
  ]);

  renderHealth(health);
  renderMessages(messages);
  renderUsage(usage);
  renderHypotheses(hypotheses);
  renderQueue(queue);
  renderVersions();

  document.getElementById("last-refresh").textContent =
    "Last refresh: " + new Date().toLocaleTimeString();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
loadAll();
// Auto-refresh every 5 minutes
setInterval(loadAll, 5 * 60 * 1000);
</script>
</body>
</html>
